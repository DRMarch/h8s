apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage-operator-helm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-300"
spec:
  project: default
  sources:
    - repoURL: ghcr.io/rajsinghtech/charts
      chart: garage-operator
      targetRevision: 0.3.13 # April 2026
      helm:
        valueFiles:
          - $h8s/storage/garage/operator/values.yaml
    - repoURL: https://github.com/DRMarch/h8s.git
      targetRevision: HEAD
      ref: h8s
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
