apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authelia-helm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "-295"
spec:
  project: default
  sources:
    - repoURL: https://charts.authelia.com
      chart: authelia
      targetRevision: 0.11.6
      helm:
        releaseName: authelia
        valueFiles:
          - $h8s/security/authelia/helm/values.yaml
    - repoURL: https://github.com/DRMarch/h8s.git
      targetRevision: HEAD
      ref: h8s
    - repoURL: https://github.com/DRMarch/h8s.git
      targetRevision: HEAD
      path: security/authelia/helm/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: authelia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PruneLast=true
      - ServerSideApply=true
      - CreateNamespace=true
