apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bytestash
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://jordan-dalby.github.io/ByteStash/
      chart: bytestash
      targetRevision: 0.1.1
      helm:
        releaseName: bytestash
        valueFiles:
          - $h8s/applications/bytestash/helm/values.yaml
    - repoURL: https://github.com/DRMarch/h8s.git
      targetRevision: HEAD
      ref: h8s
    - repoURL: https://github.com/DRMarch/h8s.git
      targetRevision: HEAD
      path: applications/bytestash/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: bytestash
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PruneLast=true
      - ServerSideApply=true
      - CreateNamespace=true
