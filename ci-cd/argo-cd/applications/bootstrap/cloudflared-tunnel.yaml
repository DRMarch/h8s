apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared-tunnel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-350"
spec:
  project: default
  source:
    repoURL: https://github.com/DRMarch/h8s.git
    targetRevision: HEAD
    path: networking/cloudflared/
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
      - ServerSideApply=true
