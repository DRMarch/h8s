apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
spec:
  config:
    server:
      domain: "grafana.drmarchent.com"
      root_url: "https://%(domain)s/"
    auth.generic_oauth:
      enabled: "true"
      name: Authelia
      icon: signin
      client_id: grafana
      client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
      scopes: openid profile email groups
      empty_scopes: "false"
      auth_url: https://auth.drmarchent.com/api/oidc/authorization
      token_url: https://auth.drmarchent.com/api/oidc/token
      api_url: https://auth.drmarchent.com/api/oidc/userinfo
      role_attribute_path: contains(groups[*], 'admins') && 'Admin' || 'Viewer'
      allow_sign_up: "true"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_USER
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: GF_SECURITY_ADMIN_PASSWORD
                # Trust Remote-User / Remote-Groups headers from the Authelia
                # ext_authz filter in front of Grafana (see
                # networking/gateway/resources/http-routes/grafana.yaml).
                - name: GF_AUTH_PROXY_ENABLED
                  value: "true"
                - name: GF_AUTH_PROXY_HEADER_NAME
                  value: Remote-User
                - name: GF_AUTH_PROXY_HEADER_PROPERTY
                  value: username
                - name: GF_AUTH_PROXY_HEADERS
                  value: "groups:Remote-Groups"
                - name: GF_AUTH_PROXY_AUTO_SIGN_UP
                  value: "true"
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-oidc-client-secret
                      key: client-secret
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 5Gi
