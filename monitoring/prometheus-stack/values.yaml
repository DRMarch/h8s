# https://raw.githubusercontent.com/prometheus-community/helm-charts/refs/tags/kube-prometheus-stack-84.5.0/charts/kube-prometheus-stack/values.yaml
namespaceOverride: monitoring
prometheus:
  prometheusSpec:
    # Stops the need to have to specify release tags
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Stops the need to be in the same namespace
    serviceMonitorNamespaceSelector: {}
    podMonitorNamespaceSelector: {}
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    persistentVolumeClaimRetentionPolicy:
      whenDeleted: Retain
      whenScaled: Retain
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

grafana:
  enabled: false
