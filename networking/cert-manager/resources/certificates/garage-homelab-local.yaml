apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: garage-homelab-local
  namespace: garage
spec:
  secretName: garage-homelab-local-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: garage.drmarchent.com
  dnsNames:
    - "s3.drmarchent.com"
    - "*.s3.drmarchent.com"
    - "garage.drmarchent.com"
