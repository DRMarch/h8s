apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: garage-homelab-local
  namespace: garage
spec:
  secretName: garage-homelab-local-tls
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: garage.homelab.local
  dnsNames:
    - "s3.homelab.local"
    - "*.s3.homelab.local"
    - "garage.homelab.local"
