apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: endurain
  namespace: endurain
spec:
  parentRefs:
    - name: lan-gateway
      namespace: default
      sectionName: home-lan-endurain
  hostnames:
    - endurain.drmarchent.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: endurain
          port: 8080
