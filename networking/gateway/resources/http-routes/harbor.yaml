apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor
spec:
  parentRefs:
    - name: lan-gateway
      namespace: default
      sectionName: home-lan-harbor
  hostnames:
    - harbor.drmarchent.com
  rules:
    # Rule 1: Redirect ext_authz path hits back to root so the browser
    #         doesn't get stuck on Authentik's opaque ext_authz response.
    - matches:
        - path:
            type: PathPrefix
            value: /outpost.goauthentik.io
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /

    # Rule 2: Forward Authentik flow/UI and OAuth callback paths directly.
    - matches:
        - path:
            type: PathPrefix
            value: /if/
        - path:
            type: PathPrefix
            value: /application/
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Host
                value: harbor.drmarchent.com
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: authentik-server
          namespace: authentik
          port: 80

    # Rule 3: Main protected route — delegates auth to Authentik via ExternalAuth.
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Host
                value: harbor.drmarchent.com
              - name: X-Forwarded-Proto
                value: https
        - type: ExternalAuth
          externalAuth:
            protocol: HTTP
            backendRef:
              name: authentik-server
              namespace: authentik
              port: 80
            http:
              path: /outpost.goauthentik.io/auth/envoy/
              allowedHeaders:
                - cookie
      backendRefs:
        - name: harbor
          port: 80
