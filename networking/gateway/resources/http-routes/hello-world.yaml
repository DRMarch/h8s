apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-world
  namespace: hello-world
spec:
  parentRefs:
    - name: lan-gateway
      namespace: default
      sectionName: home-lan-hello-world
    - name: cloudflare-gateway
      namespace: cloudflare
  hostnames:
    - helloworld.drmarchent.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Host
                value: helloworld.drmarchent.com
              - name: X-Forwarded-Proto
                value: https
        - type: ExternalAuth
          externalAuth:
            protocol: HTTP
            backendRef:
              name: authelia
              namespace: authelia
              port: 80
            http:
              path: /api/authz/ext-authz/
              allowedHeaders:
                - accept
                - host
                - cookie
                - authorization
                - proxy-authorization
                - x-forwarded-method
                - x-forwarded-uri
                - x-forwarded-host
                - x-forwarded-proto
                - x-forwarded-for
                - x-real-ip
                - x-envoy-original-path
      backendRefs:
        - name: nginx-hello-world
          port: 80
