apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: authelia-oidc-rsa-key
  namespace: authelia
spec:
  secretName: authelia-oidc-rsa-key
  duration: 87600h
  renewBefore: 720h
  isCA: false
  commonName: authelia-oidc
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
