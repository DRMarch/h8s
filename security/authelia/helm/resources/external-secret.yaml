apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authelia-grafana-oidc-secret
  namespace: authelia
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-cluster-secretstore
    kind: ClusterSecretStore
  data:
    - secretKey: grafana-secret
      remoteRef:
        key: kubernetes-homelab/authelia/grafana-oidc
        property: client_secret
  target:
    name: authelia-oidc-client-secrets
    creationPolicy: Owner
