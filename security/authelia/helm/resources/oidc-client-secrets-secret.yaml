apiVersion: v1
kind: Secret
metadata:
  name: authelia-oidc-client-secrets
  namespace: authelia
type: Opaque
# Populated by ExternalSecret from Vault path
# kubernetes-homelab/authelia/grafana-oidc.
# Contains the grafana-secret key, used as the OIDC client_secret for Grafana.
# Used in Phase 2 when Grafana gets real OIDC login.
