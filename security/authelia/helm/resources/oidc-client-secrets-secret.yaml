apiVersion: v1
kind: Secret
metadata:
  name: authelia-oidc-client-secrets
  namespace: authelia
  annotations:
    secret-generator.v1.mittwald.de/autogenerate: grafana-secret
    secret-generator.v1.mittwald.de/encoding: hex
    secret-generator.v1.mittwald.de/length: "64"
type: Opaque
# The OIDC client_secret Grafana presents to Authelia during the token
# endpoint exchange. Generated in-cluster by the mittwald
# kubernetes-secret-generator operator. Consumed by Authelia via the
# volumeMount in security/authelia/helm/values.yaml and (in Phase 2) by
# Grafana via secretKeyRef on the same Secret.
