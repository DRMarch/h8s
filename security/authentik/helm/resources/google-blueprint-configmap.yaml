apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-google-blueprint
  namespace: authentik
data:
  google-source.yaml: |
    # yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: google-oidc-source
      labels:
        blueprints.goauthentik.io/instantiate: "true"
        blueprints.goauthentik.io/description: "Google OAuth source for user authentication"
    entries:
      # Google OAuth source. Consumer key and secret are set manually in the Authentik
      # UI after deployment (stored in Vault at secret/h8s/authentik/google-oauth).
      - model: authentik_sources_oauth.oauthsource
        state: created
        identifiers:
          slug: google
        attrs:
          name: Google
          provider_type: google
          consumer_key: "PLACEHOLDER"
          consumer_secret: "PLACEHOLDER"

      # Add the Google source to the default authentication identification stage
      # so the "Login with Google" button appears on the Authentik login page.
      - model: authentik_stages_identification.identificationstage
        state: present
        identifiers:
          name: default-authentication-identification
        id: identification-stage
        attrs:
          sources:
            - !Find [authentik_sources_oauth.oauthsource, [slug, google]]

      # Expression policy: automatically use the Google email address as the
      # Authentik username during enrollment. Bound to default-source-enrollment-prompt.
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: google-username-from-email
        attrs:
          expression: |
            email = request.context["prompt_data"]["email"]
            request.context["prompt_data"]["username"] = email
            return False
