apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-harbor-blueprint
  namespace: authentik
data:
  harbor-proxy.yaml: |
    # yaml-language-server: $schema=https://version-2026-5.goauthentik.io/blueprints/schema.json
    version: 1
    metadata:
      name: harbor-proxy
      labels:
        blueprints.goauthentik.io/instantiate: "true"
        blueprints.goauthentik.io/description: "Harbor proxy provider + application + Google-only access policy"
    entries:
      # Proxy provider — forward_single mode for ExternalAuth filter
      - model: authentik_providers_proxy.proxyprovider
        state: created
        identifiers:
          name: harbor-proxy
        attrs:
          mode: forward_single
          external_host: https://harbor.drmarchent.com
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]

      # Application
      - model: authentik_core.application
        state: created
        id: harbor-app
        identifiers:
          slug: harbor
        attrs:
          name: Harbor
          provider: !Find [authentik_providers_proxy.proxyprovider, [name, harbor-proxy]]
          meta_launch_url: https://harbor.drmarchent.com
          policy_engine_mode: all

      # Expression policy — only users authenticated via Google OAuth
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: google-users-only
        attrs:
          expression: |
            if request.user.is_superuser:
                return True
            source = getattr(request.user, "source", None)
            if source and source.slug == "google":
                return True
            return False

      # Policy binding
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          target: !KeyOf harbor-app
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, google-users-only]]
          order: 0

