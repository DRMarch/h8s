apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-authelia
  namespace: authelia
spec:
  description: Postgres cluster for Authelia
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 1
  storage:
    size: 5Gi
  managed:
    roles:
      - name: authelia
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: cnpg-authelia-user-credentials
          key: password
  enableSuperuserAccess: false
  monitoring:
    enablePodMonitor: true
