apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-authentik
  namespace: authentik
spec:
  description: Postgres cluster for Authentik
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 1
  storage:
    size: 10Gi
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: cnpg-authentik-user-credentials
          key: password
  enableSuperuserAccess: false
  monitoring:
    enablePodMonitor: true
