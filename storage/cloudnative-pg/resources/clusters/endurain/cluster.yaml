apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-endurain
  namespace: endurain
spec:
  description: Postgres cluster for Endurain
  imageName: ghcr.io/cloudnative-pg/postgresql:17.5
  instances: 1
  storage:
    size: 16Gi
  managed:
    roles:
      - name: endurain
        ensure: present
        login: true
        superuser: false
        passwordSecret:
          name: cnpg-endurain-user-credentials
          key: password
  enableSuperuserAccess: false
  monitoring:
    enablePodMonitor: true
